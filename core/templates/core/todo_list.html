{% extends 'base.html' %}

{% block content %}
<div class="row mb-3">
    <div class="col">
        <h2>My Todos</h2>
    </div>
    <div class="col text-end">
        <a href="{% url 'todo-create' %}" class="btn btn-primary">Add Todo</a>
    </div>
</div>

<div class="row">
    <div class="col-md-12">
        {% for todo in todos %}
            <div class="card mb-2">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <form action="{% url 'todo-toggle' todo.pk %}" method="post" class="me-3">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-sm {% if todo.is_completed %}btn-success{% else %}btn-outline-secondary{% endif %}">
                                {% if todo.is_completed %}✓{% else %}O{% endif %}
                            </button>
                        </form>
                        
                        <div>
                            <h5 class="card-title mb-0 {% if todo.is_completed %}text-decoration-line-through text-muted{% endif %}">
                                {{ todo.title }}
                            </h5>
                            <small class="text-muted">Created: {{ todo.created_at|date:"M d, Y" }}</small>
                        </div>
                    </div>
                    <div>
                        <a href="{% url 'todo-update' todo.pk %}" class="btn btn-secondary btn-sm">Edit</a>
                    </div>
                </div>
            </div>
        {% empty %}
            <div class="alert alert-info">No todos found. Create one to get started!</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
