{% extends 'base.html' %}

{% block content %}
<div class="row mb-3">
    <div class="col">
        <h2>Life Goals</h2>
    </div>
    <div class="col text-end">
        <a href="{% url 'lifegoal-create' %}" class="btn btn-primary">Set New Goal</a>
    </div>
</div>

<div class="row">
    {% for goal in goals %}
        <div class="col-md-6 mb-4">
            <div class="card h-100 {% if goal.status == 'Completed' %}border-success{% endif %}">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span class="badge bg-secondary">{{ goal.status }}</span>
                    <small>Target: {{ goal.target_date|date:"M d, Y" }}</small>
                </div>
                <div class="card-body">
                    <h5 class="card-title">{{ goal.title }}</h5>
                    <p class="card-text">{{ goal.description }}</p>
                </div>
                <div class="card-footer bg-transparent border-top-0">
                    <a href="{% url 'lifegoal-update' goal.pk %}" class="btn btn-sm btn-outline-primary">Update</a>
                    <a href="{% url 'lifegoal-delete' goal.pk %}" class="btn btn-sm btn-outline-danger float-end">Delete</a>
                </div>
            </div>
        </div>
    {% empty %}
        <div class="col">
            <div class="alert alert-info">No goals set yet. Dream big!</div>
        </div>
    {% endfor %}
</div>
{% endblock %}
