{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">Delete Goal?</div>
            <div class="card-body">
                <p>Are you sure you want to give up on "<strong>{{ object.title }}</strong>"?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'lifegoal-list' %}" class="btn btn-secondary">No, Keep it</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
