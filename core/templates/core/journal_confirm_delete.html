{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
                <div class="mb-4">
                    <i class="bi bi-exclamation-circle text-danger display-1"></i>
                </div>
                <h3 class="card-title fw-bold mb-3">Delete Journal Entry?</h3>
                <p class="card-text text-muted mb-4">
                    Are you sure you want to delete the journal entry <strong>"{{ object.title }}"</strong> from {{ object.date }}? This action cannot be undone.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2 d-md-block">
                        <a href="{% url 'journal-list' %}" class="btn btn-light me-md-2">Cancel</a>
                        <button type="submit" class="btn btn-danger">Delete Entry</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
