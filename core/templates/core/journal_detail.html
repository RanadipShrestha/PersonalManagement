{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>{{ object.date|date:"l, F d, Y" }}</span>
                <span class="badge bg-info">{{ object.mood }}</span>
            </div>
            <div class="card-body">
                <h2 class="card-title">{{ object.title }}</h2>
                <hr>
                <div class="card-text" style="white-space: pre-wrap;">{{ object.content }}</div>
            </div>
            <div class="card-footer text-muted">
                <a href="{% url 'journal-list' %}" class="btn btn-secondary btn-sm">Back to List</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
