{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">Confirm Deletion</div>
            <div class="card-body">
                <p>Are you sure you want to delete the holding for <strong>{{ object.company_name }}</strong>?</p>
                <p class="text-danger"><strong>Warning:</strong> This will also delete all associated sales records!</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Confirm Delete</button>
                    <a href="{% url 'share-dashboard' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
