{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h3 class="card-title mb-0">Confirm Delete</h3>
                </div>
                <div class="card-body">
                    <p>Are you sure you want to delete this transaction?</p>
                    <div class="alert alert-secondary">
                        <strong>Date:</strong> {{ object.date }}<br>
                        <strong>Amount:</strong> {{ object.amount }}<br>
                        <strong>Type:</strong> {% if object.is_expense %}Expense{% else %}Income{% endif %}<br>
                        <strong>Notes:</strong> {{ object.notes }}
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'transaction-list' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-danger">Confirm Delete</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
