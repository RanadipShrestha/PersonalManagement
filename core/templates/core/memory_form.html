{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-white">
                <h2 class="h4 mb-0">Add New Memory</h2>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="{% url 'memory-list' %}" class="btn btn-outline-secondary me-md-2">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save Memory</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Add multiple attribute to the files input if not already there
    document.addEventListener('DOMContentLoaded', function() {
        const fileInput = document.querySelector('input[type="file"]');
        if (fileInput) {
            fileInput.setAttribute('multiple', 'multiple');
        }
    });
</script>
{% endblock %}
